<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>

    <title>Crear Misión, Visión y Valores</title>
</head>


<body class="bg-gradient-to-br from-blue-500 to-purple-600 min-h-screen  items-center justify-center">
    <div th:insert="components/navbar :: navbar"></div>

    <div class="bg-white/90 shadow-xl rounded-lg p-8 w-full max-w-2xl mx-auto mt-12">

        <h1 class="text-2xl font-bold text-center text-purple-700 mb-8">Crear Misión, Visión y Valores</h1>
        <form th:action="@{/consola/mision-vision-valores/crear}" method="post" th:object="${misionVisionValores}"
            class="space-y-6">
            <input type="hidden" th:field="*{id}" />
            <div>
                <label for="mision" class="block text-sm font-medium text-gray-700 mb-1">Misión:</label>
                <textarea id="mision" th:field="*{mision}" rows="3" required
                    class="block w-full rounded-md border-gray-300 shadow-sm focus:border-purple-500 focus:ring focus:ring-purple-200 focus:ring-opacity-50 px-3 py-2 resize-none"></textarea>
            </div>
            <div>
                <label for="vision" class="block text-sm font-medium text-gray-700 mb-1">Visión:</label>
                <textarea id="vision" th:field="*{vision}" rows="3" required
                    class="block w-full rounded-md border-gray-300 shadow-sm focus:border-purple-500 focus:ring focus:ring-purple-200 focus:ring-opacity-50 px-3 py-2 resize-none"></textarea>
            </div>
            <div>
                <label for="valores" class="block text-sm font-medium text-gray-700 mb-1">Valores:</label>
                <textarea id="valores" th:field="*{valores}" rows="3" required
                    class="block w-full rounded-md border-gray-300 shadow-sm focus:border-purple-500 focus:ring focus:ring-purple-200 focus:ring-opacity-50 px-3 py-2 resize-none"></textarea>
            </div>
            <div>
                <label for="politica" class="block text-sm font-medium text-gray-700 mb-1">Políticas:</label>
                <textarea id="politica" th:field="*{politica}" rows="3" required
                    class="block w-full rounded-md border-gray-300 shadow-sm focus:border-purple-500 focus:ring focus:ring-purple-200 focus:ring-opacity-50 px-3 py-2 resize-none"></textarea>
            </div>
            <div>
                <label for="objetivo" class="block text-sm font-medium text-gray-700 mb-1">Objetivos SGE:</label>
                <textarea id="objetivosSGE" th:field="*{objetivosSGE}" rows="3" required
                    class="block w-full rounded-md border-gray-300 shadow-sm focus:border-purple-500 focus:ring focus:ring-purple-200 focus:ring-opacity-50 px-3 py-2 resize-none"></textarea>
            </div>
            <button type="submit"
                class="w-full py-2 px-4 bg-purple-600 hover:bg-purple-700 text-white font-semibold rounded-md shadow transition duration-200">Guardar</button>
        </form>
    </div>
</body>

</html>
