<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<script src="https://cdn.tailwindcss.com"></script>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-start">
    <div th:replace="components/navbar :: navbar"></div>
    <div th:replace="components/breadcrumb :: breadcrumb(${rutas})"></div>


    <main class="flex flex-col items-center justify-center flex-1">
        <video src="https://www.uteq.edu.mx/assets/video/video-banner.mp4" class="w-full h-full object-cover" autoplay
            loop muted playsinline></video>
    </main>

    <footer class="w-full bg-blue-700 text-white py-6 mt-8 shadow-inner">
        <div class="max-w-5xl mx-auto px-4 flex flex-col md:flex-row items-center justify-between">
            <div class="text-center md:text-left mb-2 md:mb-0">
                <span class="font-semibold">&copy; 2026 Universidad Tecnológica de Querétaro</span>
                <span class="block md:inline ml-0 md:ml-2 text-sm">Todos los derechos reservados.</span>
            </div>
            <div class="flex space-x-4">
                <a href="https://www.uteq.edu.mx/" target="_blank" class="hover:underline hover:text-blue-200">Sitio
                    oficial</a>
                <a href="mailto:info@uteq.edu.mx" class="hover:underline hover:text-blue-200">Contacto</a>
            </div>
        </div>
    </footer>

</body>

</html>
