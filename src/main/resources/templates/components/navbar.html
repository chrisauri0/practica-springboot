<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<script src="https://cdn.tailwindcss.com"></script>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>


<body class="bg-gray-50">
    <nav th:fragment="navbar"
        class="w-full bg-blue-700 px-4 py-3 flex flex-wrap items-center justify-between shadow-lg mb-8">
        <div class="flex items-center space-x-6">
            <a class="text-white font-bold text-lg hover:text-blue-200 transition" th:href="@{/}">
                Inicio
            </a>

            <!-- Dropdown Segundo -->
            <div class="relative group">
                <button
                    class="text-white font-semibold hover:text-blue-200 transition flex items-center gap-1 focus:outline-none">
                    Segundo
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                    </svg>
                </button>
                <div
                    class="absolute left-0 top-full hidden group-hover:block bg-white rounded shadow-lg min-w-[180px] z-50 mt-2">
                    <a th:href="@{/segundo}" class="block px-5 py-2 hover:bg-blue-100 text-gray-700">Página Segundo</a>
                    <a th:href="@{/sitemap}" class="block px-5 py-2 hover:bg-blue-100 text-gray-700">Sitemap</a>
                </div>
            </div>

            <a class="text-white font-semibold hover:text-blue-200 transition" th:href="@{/quienes}">Quienes somos</a>

            <!-- Dropdown Oferta Educativa -->
            <div class="relative group">
                <button
                    class="text-white font-semibold hover:text-blue-200 transition flex items-center gap-1 focus:outline-none">
                    Oferta Educativa
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                    </svg>
                </button>
                <div
                    class="absolute left-0 top-full hidden group-hover:block bg-white rounded shadow-lg min-w-[180px] z-50 mt-2">
                    <a th:href="@{/oferta-educativa}" class="block px-5 py-2 hover:bg-blue-100 text-gray-700">Ver Oferta
                        Educativa</a>
                    <a th:href="@{/consola/oferta-educativa/form}"
                        class="block px-5 py-2 hover:bg-blue-100 text-gray-700">Crear Oferta Educativa</a>
                </div>
            </div>

            <!-- Dropdown Consola -->
            <div class="relative group">
                <button
                    class="text-white font-semibold hover:text-blue-200 transition flex items-center gap-1 focus:outline-none">
                    Consola
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                    </svg>
                </button>
                <div
                    class="absolute left-0 top-full hidden group-hover:block bg-white rounded shadow-lg min-w-[180px] z-50 mt-2">
                    <a th:href="@{/consola/division/form}"
                        class="block px-5 py-2 hover:bg-blue-100 text-gray-700">Divisiones</a>
                    <a th:href="@{/consola/oferta-educativa/form}"
                        class="block px-5 py-2 hover:bg-blue-100 text-gray-700">Ofertas Educativas</a>
                </div>
            </div>
        </div>

        <div class="flex items-center space-x-4 mt-4 md:mt-0">
            <span sec:authentication="name" class="text-white font-semibold"></span>
            <span class="text-white font-light text-xs">|</span>
            <span sec:authentication="principal.authorities" class="text-white font-semibold"></span>
            <form th:action="@{/logout}" method="post" class="inline-block ml-2">
                <button type="submit"
                    class="bg-blue-500 hover:bg-blue-600 text-white font-semibold px-3 py-1 rounded transition">Logout</button>
            </form>
        </div>
    </nav>
</body>

</html>
