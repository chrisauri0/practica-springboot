<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Nueva Contraseña</title>
</head>


<body class="bg-gradient-to-br from-blue-500 to-purple-600 min-h-screen flex items-center justify-center">
    <div class="bg-white/90 shadow-xl rounded-lg p-8 w-full max-w-md">
        <h1 class="text-2xl font-bold text-center text-purple-700 mb-6">Establecer nueva contraseña</h1>
        <form action="/nueva-contrasena" method="post" class="space-y-6">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700">Correo electrónico</label>
                <input type="email" id="email" name="email" required
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-purple-500 focus:ring focus:ring-purple-200 focus:ring-opacity-50 px-3 py-2">
            </div>
            <div>
                <label for="codigo" class="block text-sm font-medium text-gray-700">Código recibido</label>
                <input type="text" id="codigo" name="codigo" required
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-purple-500 focus:ring focus:ring-purple-200 focus:ring-opacity-50 px-3 py-2">
            </div>
            <div>
                <label for="nuevaContrasena" class="block text-sm font-medium text-gray-700">Nueva contraseña</label>
                <input type="password" id="nuevaContrasena" name="nuevaContrasena" required
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-purple-500 focus:ring focus:ring-purple-200 focus:ring-opacity-50 px-3 py-2">
            </div>
            <button type="submit"
                class="w-full py-2 px-4 bg-purple-600 hover:bg-purple-700 text-white font-semibold rounded-md shadow transition duration-200">Guardar
                contraseña</button>
        </form>
        <a href="/login" class="block mt-4 text-center text-sm text-purple-600 hover:text-purple-800">Volver al
            login</a>
    </div>
</body>

</html>
