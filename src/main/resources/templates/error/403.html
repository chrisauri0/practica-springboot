<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Acceso Denegado</title>
    <!-- Tailwind CSS is loaded via CDN -->
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-xl shadow-lg flex flex-col items-center w-full max-w-md">
        <img src="/images/lock.png" alt="Acceso Denegado" class="w-28 mb-4" onerror="this.style.display='none'">
        <div class="text-6xl font-bold text-red-600 mb-2">403</div>
        <div class="text-xl text-gray-700 mb-6 text-center">Acceso denegado. No tienes permisos para ver esta página.
        </div>
        <a href="/"
            class="bg-blue-600 hover:bg-blue-800 text-white px-6 py-2 rounded-md text-lg font-semibold transition-colors">Regresar
            al inicio</a>
    </div>
</body>

</html>
